<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Narzullayev Academy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh;color:#1a2a4a}
:root{--gd:#a07830;--gold:#c9a84c;--gold2:#e8c96d}
#LP{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(150deg,#060e1a,#0d1b2a,#112240)}
.LC{background:linear-gradient(145deg,#112240,#0d1b2a);border-radius:20px;padding:36px;width:360px;border:1px solid rgba(201,168,76,.2);box-shadow:0 20px 60px rgba(0,0,0,.6)}
.LL{display:flex;align-items:center;gap:12px;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid rgba(201,168,76,.15)}
.LL-t{font-size:18px;font-weight:800;color:#e8c96d}
.LL-s{font-size:11px;color:#aaa;letter-spacing:1px}
.LROLE{display:flex;gap:6px;margin-bottom:14px}
.LRB{flex:1;padding:9px 4px;border:1px solid rgba(201,168,76,.2);border-radius:8px;cursor:pointer;font-size:11px;font-weight:700;color:#888;text-align:center;background:transparent;transition:.2s}
.LRB.on{border-color:#a07830;background:rgba(201,168,76,.12);color:#a07830}
.LF{margin-bottom:12px}
.LF label{display:block;font-size:11px;font-weight:700;color:#888;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.LF input{width:100%;padding:11px 13px;border:1px solid rgba(201,168,76,.2);border-radius:8px;font-size:13px;color:#e8e8e8;background:rgba(255,255,255,.05);transition:.2s}
.LF input:focus{outline:none;border-color:#c9a84c}
.LF input::placeholder{color:#555}
.LBTN{width:100%;padding:13px;background:linear-gradient(135deg,#a07830,#e8c96d);color:#0d1b2a;border:none;border-radius:9px;font-size:15px;font-weight:800;cursor:pointer;margin-top:4px}
.LERR{background:rgba(231,76,60,.1);color:#e74c3c;padding:9px 12px;border-radius:7px;font-size:12px;margin-bottom:10px;border:1px solid rgba(231,76,60,.25);display:none}
#APP{display:none;min-height:100vh}
.LAY{display:flex;min-height:100vh}
.SB{width:220px;background:linear-gradient(180deg,#0d1b2a,#112240);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;border-right:1px solid rgba(201,168,76,.1)}
.SB-HEAD{padding:16px;border-bottom:1px solid rgba(201,168,76,.1);display:flex;align-items:center;gap:10px}
.SB-HEAD img{width:40px;height:40px;object-fit:contain}
.SB-NM{font-size:13px;font-weight:800;color:#e8c96d}
.SB-RL2{font-size:10px;color:#aaa;margin-top:1px}
.SB-AV{width:36px;height:36px;background:linear-gradient(135deg,#a07830,#e8c96d);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#0d1b2a;flex-shrink:0}
.SB-USER{padding:12px 16px;border-bottom:1px solid rgba(201,168,76,.08)}
.SB-UN{font-size:12px;font-weight:700;color:#e0e0e0}
.SB-SB{font-size:10px;color:#c9a84c;margin-top:1px}
.SB-NAV{flex:1;overflow-y:auto;padding:8px 0}
.NB{padding:11px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;color:#aaa;font-size:13px;font-weight:500;transition:.15s;border-left:3px solid transparent}
.NB:hover{background:rgba(201,168,76,.06);color:#e8c96d}
.NB.on{background:rgba(201,168,76,.1);color:#e8c96d;border-left-color:#c9a84c;font-weight:700}
.NB .ic{font-size:16px;width:20px;text-align:center}
.SB-BOT{padding:14px 16px;border-top:1px solid rgba(201,168,76,.1)}
.LOUT{width:100%;padding:9px;background:rgba(231,76,60,.1);color:#ff7675;border:1px solid rgba(231,76,60,.2);border-radius:8px;cursor:pointer;font-size:12px;font-weight:700}
.MAIN{margin-left:220px;flex:1;display:flex;flex-direction:column}
.TB{background:#fff;padding:0 22px;height:52px;display:flex;align-items:center;border-bottom:1px solid #e0e8f0;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.TB-T{font-size:15px;font-weight:700;color:#1a3a6b}
.CT{padding:20px;flex:1}
.CD{background:#fff;border-radius:12px;padding:18px;margin-bottom:14px;border:1px solid #e0e8f0;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.CDH{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.CDH h3{font-size:14px;font-weight:700;color:#1a3a6b}
.SG{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:14px}
.SC{background:#fff;border-radius:12px;padding:14px;border:1px solid #e0e8f0;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.SC.gold{border-color:rgba(201,168,76,.3);background:linear-gradient(135deg,rgba(201,168,76,.06),rgba(201,168,76,.02))}
.SI{font-size:24px;margin-bottom:6px;display:block}
.SL{font-size:10px;color:#888;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.SV{font-size:22px;font-weight:800;color:#1a3a6b}
.SV.g{color:#a07830}
.TW{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:9px 11px;text-align:left;font-weight:700;color:#a07830;font-size:11px;text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid #e8d9a0;background:#fffbf0}
td{padding:9px 11px;border-bottom:1px solid #f0f4f8;color:#1a2a4a;vertical-align:middle;font-size:13px}
tbody tr:hover td{background:#fffbf0}
.BT{padding:7px 14px;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.bt-g{background:linear-gradient(135deg,#a07830,#e8c96d);color:#0d1b2a}
.bt-b{background:rgba(52,152,219,.12);color:#2980b9;border:1px solid rgba(52,152,219,.25)}
.bt-r{background:rgba(231,76,60,.1);color:#e74c3c;border:1px solid rgba(231,76,60,.2)}
.bt-o{background:#f0f4f8;color:#555;border:1px solid #dde3ee}
.BG{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.bg{background:rgba(52,152,219,.1);color:#2980b9;border:1px solid rgba(52,152,219,.2)}
.bg2{background:rgba(39,174,96,.1);color:#27ae60;border:1px solid rgba(39,174,96,.2)}
.br{background:rgba(231,76,60,.1);color:#e74c3c;border:1px solid rgba(231,76,60,.2)}
.by{background:rgba(241,196,15,.12);color:#b8860b;border:1px solid rgba(241,196,15,.4)}
.bb{background:rgba(142,68,173,.1);color:#8e44ad;border:1px solid rgba(142,68,173,.2)}
.bgold{background:rgba(201,168,76,.15);color:#a07830;border:1px solid rgba(201,168,76,.3)}
#M{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:999;display:none;align-items:center;justify-content:center}
#M.on{display:flex}
.MB{background:#fff;border-radius:14px;padding:26px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.MB h3{font-size:15px;font-weight:800;color:#1a2a4a;margin-bottom:16px}
.MF{margin-bottom:12px}
.MF label{display:block;font-size:11px;font-weight:700;color:#888;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.MF input,.MF select,.MF textarea{width:100%;padding:9px 12px;border:1.5px solid #dde3ee;border-radius:7px;font-size:13px;color:#1a2a4a;background:#fff;font-family:inherit;transition:.2s}
.MF input:focus,.MF select:focus,.MF textarea:focus{outline:none;border-color:#c9a84c;box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.MFT{display:flex;gap:7px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid #f0f4f8}
.AV{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;font-weight:800;color:#a07830;background:#fffbf0;border:1.5px solid #e8d9a0;flex-shrink:0}
.av-s{width:30px;height:30px;font-size:11px}
.av-m{width:40px;height:40px;font-size:14px}
.EP{text-align:center;padding:40px;color:#bbb;font-size:14px}
.EI{display:block;font-size:36px;margin-bottom:8px}
.TAG{font-size:11px;background:#fffbf0;padding:2px 8px;border-radius:4px;font-family:monospace;color:#a07830;border:1px solid #e8d9a0}
.SEL,.FS{padding:8px 12px;border:1.5px solid #dde3ee;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#1a2a4a}
.FB{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px}
.FG{display:flex;flex-direction:column;gap:4px}
.FL{font-size:10px;font-weight:700;color:#a07830;text-transform:uppercase;letter-spacing:.4px}
.PB{background:#e8f0f8;border-radius:10px;height:5px;width:100px;margin-top:3px;overflow:hidden}
.PF{height:100%;background:linear-gradient(90deg,#a07830,#e8c96d);border-radius:10px}
.PR{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f4f8;gap:8px;flex-wrap:wrap}
.IR{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f4f8;font-size:13px}
.AI{background:#fffbf0;border:1px solid #e8d9a0;border-radius:8px;padding:10px 12px;font-size:12px;color:#8a6020;margin-bottom:12px}
.TST{position:fixed;bottom:20px;right:20px;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.15);max-width:300px;animation:fi .3s;background:#1a2a4a;color:#fff}
.ok{background:#27ae60!important}
.er{background:#e74c3c!important}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.G2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.G2{grid-template-columns:1fr}.SB{width:200px}.MAIN{margin-left:200px}}
.AC{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.dh{text-align:center;font-size:10px;font-weight:700;color:#888;padding:4px 0}
.AD{min-height:36px;border:1.5px solid #e8eef5;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.15s;user-select:none;background:#fafcff}
.AD b{font-size:12px;color:#555}
.AD.present{background:rgba(39,174,96,.08);border-color:rgba(39,174,96,.3)}
.AD.present b,.AD.present span{color:#27ae60}
.AD.absent{background:rgba(231,76,60,.06);border-color:rgba(231,76,60,.25)}
.AD.absent b,.AD.absent span{color:#e74c3c}
.AD.dis{opacity:.4;cursor:default}
.AD:hover:not(.dis){border-color:#c9a84c;background:#fffbf0}
.SB2{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;font-size:13px;font-weight:800;color:#fff}
.sa{background:#27ae60}.sb{background:#2980b9}.sc{background:#e67e22}.sf{background:#e74c3c}
.SS{background:#fff;border-radius:12px;margin-bottom:14px;overflow:hidden;border:1px solid #e0e8f0}
.SST{padding:10px 16px;border-bottom:1px solid #f0e8cc;font-size:10px;font-weight:800;color:#a07830;text-transform:uppercase;letter-spacing:.6px;background:#fffbf0}
.SR{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid #f5f7fa;gap:10px;cursor:pointer;transition:.15s}
.SR:hover{background:#fffbf0}
.SRL{display:flex;align-items:center;gap:10px}
.SRI{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px}
.SRT{font-size:13px;font-weight:600;color:#1a2a4a}
.LP2{display:flex;gap:6px}
.LPL{padding:6px 12px;border-radius:20px;border:1.5px solid #dde3ee;background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:#888;transition:.2s}
.LPL.on{border-color:#c9a84c;background:#fffbf0;color:#a07830}
.TC{background:#fafcff;border:1.5px solid #e8eef5;border-radius:10px;padding:14px;margin-bottom:10px;transition:.2s}
.TC:hover{border-color:#c9a84c;background:#fffbf0}
.TC-H{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.TC-T,.STI-T{font-size:14px;font-weight:700;color:#1a2a4a}
.TC-D,.STI-M{font-size:11px;color:#888;margin-top:3px}
.TC-B{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.STI{background:#fafcff;border:1.5px solid #e8eef5;border-radius:10px;padding:14px;margin-bottom:10px}
.STI-H{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.tt-nazorat{background:rgba(52,152,219,.1);color:#2980b9;border:1px solid rgba(52,152,219,.2)}
.tt-mustaqil{background:rgba(39,174,96,.1);color:#27ae60;border:1px solid rgba(39,174,96,.2)}
.tt-yakuniy{background:rgba(201,168,76,.15);color:#a07830;border:1px solid rgba(201,168,76,.3)}
.tt-umumiy{background:rgba(142,68,173,.1);color:#8e44ad;border:1px solid rgba(142,68,173,.2)}
.tt-dars{background:rgba(230,126,34,.1);color:#d35400;border:1px solid rgba(230,126,34,.2)}
.tt-other{background:#f0f4f8;color:#555;border:1px solid #dde3ee}
.FSW{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.FSW-BTN{padding:7px 14px;border:1.5px solid #dde3ee;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;background:#fff;color:#888;transition:.2s}
.FSW-BTN.on{border-color:#c9a84c;background:#fffbf0;color:#a07830}
</style>
</head>

<script>
const MN_UZ=['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktabr','Noyabr','Dekabr'];
const MN_RU=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
let LANG=localStorage.getItem('na_lang')||'uz';
const MN=()=>LANG==='ru'?MN_RU:MN_UZ;
const TT_UZ={nazorat:'Nazorat ishi',mustaqil:'Mustaqil ish',yakuniy:'Yakuniy test',umumiy:'Umumiy test',dars:'Dars nazorati',other:'Boshqa'};
const TT_RU={nazorat:'Контрольная',mustaqil:'Самостоятельная',yakuniy:'Итоговый',umumiy:'Общий тест',dars:'Текущий контроль',other:'Другое'};
const TT=()=>LANG==='ru'?TT_RU:TT_UZ;
const TTYPES=['nazorat','mustaqil','yakuniy','umumiy','dars','other'];
let CU=null,LR='admin',CN='';
const NOW=new Date(),CM=NOW.getMonth()+1,CY=NOW.getFullYear();
const pad=n=>n<10?'0'+n:''+n;
const dim=(y,m)=>new Date(y,m,0).getDate();
const ini=n=>{if(!n)return'?';const p=n.trim().split(' ');return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n[0].toUpperCase()};
const SC=s=>s>=85?'sa':s>=70?'sb':s>=55?'sc':'sf';
const SL=s=>s>=85?'A':s>=70?'B':s>=55?'C':'F';
const GL=s=>s>=85?`A\'lo`:s>=70?'Yaxshi':s>=55?'Qoniqarli':'Qoniqarsiz';
const FM=n=>Number(n).toLocaleString()+" so\'m";
const UID=()=>'_'+Math.random().toString(36).slice(2,8);
const tod=()=>`${CY}-${pad(CM)}-${pad(NOW.getDate())}`;
const ttL=tp=>TT()[tp]||(LANG==='ru'?'Другое':'Boshqa');
const ttC=tp=>`tt-${TTYPES.includes(tp)?tp:'other'}`;
const gB=txt=>`<span class="BG bgold">${txt}</span>`;
const noD=msg=>`<div class="EP"><span class="EI">&#128202;</span>${msg}</div>`;

let DB={users:[],teachers:[],students:[],enrollments:[],tests:[],att:{},pays:{}};
function save(){try{localStorage.setItem('nadb',JSON.stringify(DB))}catch(e){}}
function load(){try{const d=localStorage.getItem('nadb');if(d)DB=JSON.parse(d);else initDB();}catch(e){initDB();}}
function initDB(){
  DB={users:[{id:'u0',login:'admin',password:'admin123',role:'admin',fullName:'Bosh Administrator',phone:''}],
  teachers:[],students:[],enrollments:[],tests:[],att:{},pays:{}};save();
}
load();
const gU=id=>DB.users.find(x=>x.id===id);
const gT=id=>DB.teachers.find(x=>x.id===id);
const gTU=uid=>DB.teachers.find(x=>x.userId===uid);
const gS=id=>DB.students.find(x=>x.id===id);
const gSU=uid=>DB.students.find(x=>x.userId===uid);
const gUT=te=>te?gU(te.userId):null;
const gUS=s=>s?gU(s.userId):null;
const getSTe=sid=>DB.enrollments.filter(e=>e.studentId===sid).map(e=>gT(e.teacherId)).filter(Boolean);
const getTSt=tid=>DB.enrollments.filter(e=>e.teacherId===tid).map(e=>gS(e.studentId)).filter(Boolean);
const getTests=(sid,tid)=>DB.tests.filter(x=>x.studentId===sid&&x.teacherId===tid).sort((a,b)=>b.date.localeCompare(a.date));
const avgSc=(sid,tid)=>{const ts=getTests(sid,tid);return ts.length?Math.round(ts.reduce((a,x)=>a+x.score,0)/ts.length):null};
const avgScAll=sid=>{const ts=DB.tests.filter(x=>x.studentId===sid);return ts.length?Math.round(ts.reduce((a,x)=>a+x.score,0)/ts.length):null};
const attR=att=>{const v=Object.values(att||{});return v.length?Math.round(v.filter(x=>x==='present').length/v.length*100):0};
const payOf=(sid,tid,m)=>((DB.pays[sid]||{})[tid]||{})[m];
const attOf=(sid,tid,m)=>((DB.att[sid]||{})[tid]||{})[m]||{};

function setL(l){
  LANG=l;localStorage.setItem('na_lang',l);
  if(CU){refreshSB();nav(CN||'dash');}
  else{applyLoginLang();}
}
function applyLoginLang(){
  const isRu=LANG==='ru';
  document.getElementById('lt-title').textContent=isRu?'Войти в систему':'Tizimga kirish';
  document.getElementById('lt-sub').textContent=isRu?'Выберите роль':'Rolni tanlang';
  document.getElementById('rb-admin').innerHTML='&#9881;<br>'+(isRu?'Админ':'Admin');
  document.getElementById('rb-teacher').innerHTML='&#128104;<br>'+(isRu?'Учитель':'O\'qituvchi');
  document.getElementById('rb-student').innerHTML='&#127891;<br>'+(isRu?'Ученик':'O\'quvchi');
  document.getElementById('lt-login').textContent=isRu?'Логин':'Login';
  document.getElementById('lt-pass').textContent=isRu?'Пароль':'Parol';
  document.getElementById('lbtn').textContent=isRu?'&#128272; Войти':'&#128272; Kirish';
  document.getElementById('ll-uz').classList.toggle('on',LANG==='uz');
  document.getElementById('ll-ru').classList.toggle('on',LANG==='ru');
}
function setR(r){LR=r;['admin','teacher','student'].forEach(x=>document.getElementById('rb-'+x).classList.toggle('on',x===r))}
function login(){
  const l=document.getElementById('lin').value.trim(),p=document.getElementById('pin').value.trim();
  const er=document.getElementById('LE');er.style.display='none';
  if(!l||!p){er.textContent="Login va parol kiriting";er.style.display='block';return}
  const u=DB.users.find(x=>x.login===l&&x.password===p);
  if(!u){er.textContent='Login yoki parol noto\'g\'ri';er.style.display='block';return}
  if(u.role!==LR){er.textContent="Rol mos emas";er.style.display='block';return}
  CU=u;document.getElementById('LP').style.display='none';document.getElementById('APP').style.display='block';
  refreshSB();nav('dash');
}
function logout(){
  CU=null;document.getElementById('APP').style.display='none';document.getElementById('LP').style.display='flex';
  document.getElementById('lin').value='';document.getElementById('pin').value='';
  document.getElementById('LE').style.display='none';
}
function refreshSB(){
  const te=gTU(CU.id);
  document.getElementById('sbav').textContent=ini(CU.fullName);
  document.getElementById('sbnm').textContent=CU.fullName.split(' ')[0];
  document.getElementById('sbsub').textContent=CU.role==='teacher'?(te?te.subject:''):(CU.role==='admin'?'Administrator':'O\'quvchi');
  const isRu=LANG==='ru';
  const navs={
    admin:[['dash',isRu?'Главная':'Bosh sahifa'],['teachers',isRu?'Учителя':'O\'qituvchilar'],['students',isRu?'Ученики':'O\'quvchilar'],['enrollments',isRu?'Список':'Fanlar'],['pays',isRu?'Оплаты':'To\'lovlar'],['reports',isRu?'Отчёты':'Hisobotlar'],['sett',isRu?'Настройки':'Sozlamalar']],
    teacher:[['dash',isRu?'Главная':'Bosh sahifa'],['mystud',isRu?'Мои ученики':'O\'quvchilarim'],['att',isRu?'Посещаемость':'Davomat'],['tests',isRu?'Тесты':'Testlar'],['pays',isRu?'Оплаты':'To\'lovlar'],['sett',isRu?'Настройки':'Sozlamalar']],
    student:[['dash',isRu?'Главная':'Bosh sahifa'],['att',isRu?'Посещаемость':'Davomatim'],['tests',isRu?'Оценки':'Baholarim'],['pays',isRu?'Оплата':'To\'lovlarim'],['sett',isRu?'Настройки':'Sozlamalar']]
  };
  const icons={dash:'📊',teachers:'👨‍🏫',students:'🎓',enrollments:'🔗',pays:'💰',reports:'📈',sett:'⚙️',mystud:'🎓',att:'📅',tests:'📝'};
  document.getElementById('sbnav').innerHTML=navs[CU.role].map(([id,lb])=>
    `<div class="NB${id===CN?' on':''}" id="n-${id}" onclick="nav('${id}')">${icons[id]} ${lb}</div>`).join('');
}
function nav(pg){
  CN=pg;document.querySelectorAll('.NB').forEach(e=>e.classList.toggle('on',e.id==='n-'+pg));
  const ru=LANG==='ru';
  const titles={dash:ru?'Главная':'Bosh sahifa',teachers:ru?'Учителя':'O\'qituvchilar',students:ru?'Ученики':'O\'quvchilar',enrollments:ru?'Список предметов':'Fanlar ro\'yxati',pays:ru?'Оплаты':'To\'lovlar',reports:ru?'Отчёты':'Hisobotlar',mystud:ru?'Мои ученики':'O\'quvchilarim',att:ru?'Посещаемость':'Davomat',tests:ru?'Тесты':'Testlar',sett:ru?'Настройки':'Sozlamalar'};
  document.getElementById('ptitle').textContent=titles[pg]||pg;
  set('<div class="EP"><span class="EI">⏳</span></div>');
  setTimeout(()=>{
    if(CU.role==='admin'){if(pg==='dash')aDash();else if(pg==='teachers')aTch();else if(pg==='students')aStu();else if(pg==='enrollments')aEnr();else if(pg==='pays')aPay(CM);else if(pg==='reports')aRep();else pSett();}
    else if(CU.role==='teacher'){if(pg==='dash')tDash();else if(pg==='mystud')tStu();else if(pg==='att')tAtt();else if(pg==='tests')tTst();else if(pg==='pays')tPay(CM);else pSett();}
    else{if(pg==='dash')sDash();else if(pg==='att')sAtt();else if(pg==='tests')sTst();else if(pg==='pays')sPay();else pSett();}
  },40);
}
const set=h=>document.getElementById('CT').innerHTML=h;
const oM=h=>{document.getElementById('MB').innerHTML=h;document.getElementById('M').classList.add('on')};
const cM=()=>document.getElementById('M').classList.remove('on');
function toast(msg,type){const el=document.createElement('div');el.className='TST'+(type?' '+type:'');el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),3000);}

  set(`<div style="max-width:500px">

const myTes=()=>{const s=myS();return s?getSTe(s.id):[]};
let curFan=null;
const fanSw=(ts,active)=>ts.length<2?'':
  `<div class="FSW">${ts.map(te=>`<button class="FSW-BTN ${te.id===active?'on':''}" data-id="${te.id}">${te.subject}</button>`).join('')}</div>`;
const bindFan=(ts,cb)=>document.querySelectorAll('.FSW-BTN').forEach(btn=>btn.onclick=()=>{curFan=btn.dataset.id;cb()});

function sDash(){
  const s=myS();if(!s)return;
  const tes=myTes();if(!curFan&&tes.length)curFan=tes[0].id;
  const all=DB.tests.filter(x=>x.studentId===s.id);
  const avgAll=all.length?Math.round(all.reduce((a,x)=>a+x.score,0)/all.length):null;
  const cards=tes.map(te=>{const att=attOf(s.id,te.id,CM),rate=attR(att),pay=payOf(s.id,te.id,CM),avg=avgSc(s.id,te.id),tu=gUT(te);
    return `<div class="CD"><div class="CDH"><h3>${gB(te.subject)}</h3></div><div class="IR"><span style="color:#888">O&#x2019;qituvchi</span><span>${tu?.fullName||'—'}</span></div><div class="IR"><span style="color:#888">Davomat</span><span><div>${rate}%</div><div class="PB" style="width:80px"><div class="PF" style="width:${rate}%"></div></div></span></div><div class="IR"><span style="color:#888">O&#x2019;rt. ball</span><span>${avg!==null?`<span class="SB2 ${SC(avg)}" style="width:28px;height:28px;font-size:11px">${avg}</span>`:'—'}</span></div><div class="IR"><span style="color:#888">To&#x2019;lov</span><span>${pay?.paid?'<span class="BG bg2">&#10003; To\'langan</span>':'<span class="BG by">&#8987; Kutilmoqda</span>'}</span></div></div>`;
  }).join('')||noD('Fan yo\'q');
  set(`<div class="CD" style="display:flex;align-items:center;gap:14px;margin-bottom:16px;background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(201,168,76,.02));border:1px solid rgba(201,168,76,.2)"><div class="AV av-m" style="width:50px;height:50px;font-size:18px">${ini(CU.fullName)}</div><div><div style="font-size:16px;font-weight:800;color:#1a3a6b">${CU.fullName}</div><div style="font-size:12px;color:#888;margin-top:3px">Fanlar: ${tes.map(te=>`<span style="color:#a07830">${te.subject}</span>`).join(' &middot; ')||'—'}</div></div></div>
  <div class="SG"><div class="SC gold"><div class="SL">Fanlar</div><div class="SV g">${tes.length}</div></div><div class="SC"><div class="SL">Testlar</div><div class="SV">${all.length}</div></div><div class="SC gold"><div class="SL">O&#x2019;rt. ball</div><div class="SV g">${avgAll!==null?avgAll:'—'}</div></div></div>
  <div class="G2">${cards}</div>`);
}

let sAtF=null,sAtM=CM;
function sAtt(){
  const s=myS();if(!s)return;const tes=myTes();
  if(!sAtF&&tes.length)sAtF=tes[0].id;
  const mnO=MN.map((mn,i)=>`<option value="${i+1}" ${i+1===sAtM?'selected':''}>${mn}</option>`).join('');
  const att=attOf(s.id,sAtF,sAtM);
  const rate=attR(att),pr=Object.values(att).filter(v=>v==='present').length,tot2=Object.values(att).length;
  const td2=dim(CY,sAtM);
  const dh=['Du','Se','Ch','Pa','Ju','Sh','Ya'].map(d=>`<div class="dh">${d}</div>`).join('');
  let dc='';
  for(let d=1;d<=td2;d++){const st=att[d]||'';dc+=`<div class="AD dis ${st}" style="pointer-events:none"><b>${d}</b><span>${st==='present'?'&#10003;':st==='absent'?'&#10007;':''}</span></div>`}
  set(`<div style="margin-bottom:14px"><h2 style="font-size:17px;font-weight:800;color:#1a3a6b">Davomatim</h2></div>
  ${fanSw(tes,sAtF)}
  <div class="CD"><div class="FB"><div class="FG"><span class="FL">Oy</span><select class="FS" onchange="sAtM=parseInt(this.value);sAtt()">${mnO}</select></div></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px"><span class="BG bg2">&#10003; ${pr} keldi</span><span class="BG br">&#10007; ${tot2-pr} kelmadi</span><span class="BG by">&#128200; ${rate}%</span></div>
  <div class="AC">${dh}${dc}</div></div>`);
  bindFan(tes,sAtt);
}

let sTeF=null,sTFF='all',sTFM=CM;
function sTst(){
  const s=myS();if(!s)return;const tes=myTes();
  if(!sTeF&&tes.length)sTeF=tes[0].id;
  const mnO=MN.map((mn,i)=>`<option value="${i+1}" ${i+1===sTFM?'selected':''}>${mn}</option>`).join('');
  let ts=sTeF?getTests(s.id,sTeF):[];
  if(sTFF==='month')ts=ts.filter(x=>x.date.startsWith(`${CY}-${pad(sTFM)}`));
  const all=DB.tests.filter(x=>x.studentId===s.id);
  const avgAll=all.length?Math.round(all.reduce((a,x)=>a+x.score,0)/all.length):null;
  const best=ts.length?Math.max(...ts.map(x=>x.score)):null;
  const cards=ts.map(x=>`<div class="STI"><div class="STI-H"><div><div class="STI-T">${x.name||ttL(x.type)}</div><div class="STI-M">&#128197; ${x.date} | <span class="BG ${ttC(x.type)}" style="font-size:10px;padding:2px 7px">${ttL(x.type)}</span></div>${x.desc?`<div style="font-size:12px;color:#888;margin-top:3px">&#128172; ${x.desc}</div>`:''}</div><div style="text-align:center"><span class="SB2 ${SC(x.score)}" style="width:44px;height:44px;font-size:16px">${x.score}</span><div style="font-size:11px;color:#888;margin-top:2px">${SL(x.score)}</div></div></div><div style="display:flex;gap:6px;flex-wrap:wrap"><span class="BG ${SC(x.score)==='sa'?'bg2':SC(x.score)==='sb'?'bb':SC(x.score)==='sc'?'by':'br'}">${GL(x.score)}</span><span class="BG ${x.score>=55?'bg2':'br'}">${x.score>=55?'O&#x2019;tdi':'O&#x2019;tmadi'}</span></div></div>`).join('');
  set(`<div style="margin-bottom:14px"><h2 style="font-size:17px;font-weight:800;color:#1a3a6b">Baholarim</h2></div>
  ${fanSw(tes,sTeF)}
  <div class="SG"><div class="SC gold"><div class="SL">Jami testlar</div><div class="SV g">${all.length}</div></div><div class="SC"><div class="SL">O&#x2019;rt. ball</div><div class="SV">${avgAll!==null?avgAll:'—'}</div></div><div class="SC gold"><div class="SL">Eng yaxshi</div><div class="SV g">${best!==null?best:'—'}</div></div></div>
  <div class="CD"><div class="FB"><div class="FG"><span class="FL">Filtr</span><select class="FS" onchange="sTFF=this.value;sTst()"><option value="all" ${sTFF==='all'?'selected':''}>Barcha</option><option value="month" ${sTFF==='month'?'selected':''}>Oy</option></select></div>${sTFF==='month'?`<div class="FG"><span class="FL">Oy</span><select class="FS" onchange="sTFM=parseInt(this.value);sTst()">${mnO}</select></div>`:''}</div>
  ${ts.length===0?noD('Test yo\'q'):cards}</div>`);
  bindFan(tes,sTst);
}

let sPaF=null;
function sPay(){
  const s=myS();if(!s)return;const tes=myTes();
  if(!sPaF&&tes.length)sPaF=tes[0].id;
  let totAll=0,pdAll=0;
  tes.forEach(te=>Object.values((DB.pays[s.id]||{})[te.id]||{}).forEach(p=>{totAll+=p.amount||0;if(p.paid)pdAll+=p.amount||0}));
  const pays=sPaF?Object.entries((DB.pays[s.id]||{})[sPaF]||{}).sort((a,b)=>b[0]-a[0]):[];
  const rows=pays.map(([m,p])=>`<div class="PR"><div><div style="font-size:14px;font-weight:700;color:#a07830">${MN()[m-1]}</div><div style="font-size:12px;color:#888">${FM(p.amount)}${p.date?' &middot; '+p.date:''}</div></div>${p.paid?'<span class="BG bg2">&#10003; To\'langan</span>':'<span class="BG by">&#8987; Kutilmoqda</span>'}</div>`).join('');
  set(`<div style="margin-bottom:14px"><h2 style="font-size:17px;font-weight:800;color:#1a3a6b">To&#x2019;lovlarim</h2></div>
  ${fanSw(tes,sPaF)}
  <div class="SG"><div class="SC gold"><div class="SL">Jami</div><div class="SV g">${(totAll/1000).toFixed(0)}K</div></div><div class="SC"><div class="SL">To&#x2019;langan</div><div class="SV">${(pdAll/1000).toFixed(0)}K</div></div><div class="SC"><div class="SL">Qoldiq</div><div class="SV">${((totAll-pdAll)/1000).toFixed(0)}K</div></div></div>
  <div class="CD">${pays.length===0?noD('Yo\'q'):rows}</div>`);
  bindFan(tes,sPay);
}
</script>
</body>
</html>
